name: Atualizar GitHub Readme Stats

on:
  schedule:
    - cron: '0 * * * *'  # a cada hora
  workflow_dispatch:     # para rodar manualmente

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Gerar stats com token
        run: |
          curl -o stats.svg "https://github-readme-stats.vercel.app/api?username=matheusraiano&show_icons=true&include_all_commits=true&count_private=true&theme=buefy&hide_border=true&token=${{ secrets.GH_TOKEN }}"
          curl -o top-langs.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=matheusraiano&layout=compact&theme=buefy&hide_border=true&count_private=true&token=${{ secrets.GH_TOKEN }}"

      - name: Commitar e enviar
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.svg top-langs.svg
          git commit -m "Atualizar stats com privados" || echo "Sem alterações"
          git push
